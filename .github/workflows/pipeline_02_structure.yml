
# this is the general build and deploy pipeline definition.
# it is called with different paramters from the
# pl-start-* scripts.

name: "02: Pipeline Structure"
on:
  workflow_call:
    secrets:
      rails_master_key:
        required: false
      RAILS_MASTER_KEY_STAGING:
        required: false
      DEPLOY_MH_STAG_KEY: 
        required: false
      DEPLOY_MH_STAG_USER:
        required: false
      DEPLOY_MH_KEY: 
        required: false
      DEPLOY_MH_USER: 
        required: false
      DEPLOY_MHIMI_KEY: 
        required: false
      DEPLOY_MHIMI_USER: 
        required: false


    inputs:
      tags:
        required: true
        type: string
      push:
        required: true
        type: boolean
      target:
        required: false
        type: string
        default: modhand-prod
      environment:
        required: false
        type: string
        default: staging
      version:
        required: false
        type: string
        default: latest

jobs:
  unit_tests:
    name: "1"
    uses: ./.github/workflows/pipeline_03_test_rails_app.yml
  system_test:
    name: "1"
    uses: ./.github/workflows/pipeline_03_system_test.yml
  code_quality:
    name: "1"
    uses: ./.github/workflows/pipeline_03_code_quality.yml

  all_tests:
    needs: [unit_tests, system_test, code_quality]
    name: All Tests OK
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo All Tests have passed!
          
  
  build_and_push:
    # needs: test_app   #### for now to get faster results on the builds
    name: "2"
    uses: ./.github/workflows/pipeline_04_docker_build_and_push.yml
    with:
      tags: ${{ inputs.tags }}
      push: ${{ inputs.push }}
      target: ${{ inputs.target }}
      environment: ${{ inputs.environment }}
      version: ${{ inputs.version }}
    secrets:
      rails_master_key: ${{ secrets.rails_master_key }}
  
  trigger-staging-deployment:
    needs: [all_tests, build_and_push]
    name: "3"
    if: ${{ inputs.environment == 'staging' && inputs.push == true }}
    uses: ./.github/workflows/pipeline_05_deploy_generic.yml
    with:
      version: ${{ inputs.version }}
      environment: 'staging'
    secrets: 
      ssh_key: ${{ secrets.DEPLOY_KEY_STAGING }}
      ssh_user: ${{ secrets.DEPLOY_USER_STAGING }}
      rails_master_key: ${{ secrets.RAILS_MASTER_KEY_STAGING }}

  trigger-imi-deployment:
    #needs: [all_tests, build_and_push]
    needs: build_and_push
    name: "3"
    if: ${{ inputs.environment == 'imi-production' && inputs.push == true }}
    uses: ./.github/workflows/pipeline_05_deploy_generic.yml
    with:
      version: ${{ inputs.version }}
      environment: 'imi-production'

  trigger-production-deployment:
    needs: [all_tests, build_and_push]
    name: "4"
    if: ${{ inputs.environment == 'production'  && inputs.push == true }}
    uses: ./.github/workflows/pipeline_05_deploy_to_production.yml
    with:
      version: ${{ inputs.version }}
    secrets:
      rails_master_key: ${{ secrets.rails_master_key }}
      DEPLOY_MH_KEY: ${{ secrets.DEPLOY_MH_KEY }}
      DEPLOY_MH_USER: ${{ secrets.DEPLOY_MH_USER }}
      DEPLOY_MHIMI_KEY: ${{ secrets.DEPLOY_MHIMI_KEY }}
      DEPLOY_MHIMI_USER: ${{ secrets.DEPLOY_MHIMI_USER }}

  info:
    name: Show Parameter
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo event_name ${{ github.event_name }}
          echo ref_type ${{ github.ref_type }}
          echo ref ${{ github.ref }}
          echo "----- inputs ------"
          echo "tags: ${{ inputs.tags }}"
          echo "push: ${{ inputs.push }}"
          echo "target: ${{ inputs.target }}"
          echo "environment: ${{ inputs.environment }}"