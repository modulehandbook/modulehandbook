
# this is the general build and deploy pipeline definition.
# it is called with different paramters from the
# pl-start-* scripts.

name: "02: Pipeline Structure"
on:
  workflow_call:
    inputs:
      tags:
        required: true
        type: string
      target:
        required: false
        type: string
        default: modhand-prod

      push:
        required: false
        type: boolean
        default: false
      deploy:
        required: false
        type: boolean
        default: false

      environment:
        required: false
        type: string
        default: staging
      version:
        required: false
        type: string
        default: latest

    secrets:
      ssh_key:
        required: false
      ssh_user:
        required: false
      rails_master_key:
        required: false

jobs:
  unit_tests:
    name: "1"
    uses: ./.github/workflows/pipeline_03_test_rails_app.yml
  system_test:
    name: "1"
    uses: ./.github/workflows/pipeline_03_system_test.yml
  code_quality:
    name: "1"
    uses: ./.github/workflows/pipeline_03_code_quality.yml

  all_tests:
    needs: [unit_tests, system_test, code_quality]
    name: All Tests OK
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo All Tests have passed!
          
  
  build_and_push:
    # needs: test_app   #### for now to get faster results on the builds
    name: "2"
    uses: ./.github/workflows/pipeline_04_docker_build_and_push.yml
    with:
      tags: ${{ inputs.tags }}
      push: ${{ inputs.push }}
      target: ${{ inputs.target }}
      environment: ${{ inputs.environment }}
      version: ${{ inputs.version }}
    secrets:
      rails_master_key: ${{ secrets.rails_master_key }}


  trigger-staging-deployment:
    #needs: [all_tests, build_and_push]
    needs: build_and_push
    name: "3"
    if: ${{ inputs.environment == 'staging' && inputs.deploy == true }}
    uses: ./.github/workflows/pipeline_05_deploy_generic.yml
    with:
      version: ${{ inputs.version }}
      environment: 'staging'
      name: 'Deploy Staging'
    secrets: 
      ssh_key: ${{ secrets.ssh_key }}
      ssh_user: ${{ secrets.ssh_user }}
      rails_master_key: ${{ secrets.rails_master_key }}

  trigger-imi-deployment:
    #needs: [all_tests, build_and_push]
    needs: build_and_push
    name: "3"
    if: ${{ inputs.environment == 'imi_production' && inputs.deploy == true }}
    uses: ./.github/workflows/pipeline_05_deploy_generic.yml
    with:
      version: ${{ inputs.version }}
      environment: 'imi_production'
    secrets: 
      ssh_key: ${{ secrets.ssh_key }}
      ssh_user: ${{ secrets.ssh_user }}
      rails_master_key: ${{ secrets.rails_master_key }}

  trigger-production-deployment:
    #needs: [all_tests, build_and_push]
    needs: build_and_push
    name: "3"
    if: ${{ inputs.environment == 'production' && inputs.deploy == true }}
    uses: ./.github/workflows/pipeline_05_deploy_generic.yml
    with:
      version: ${{ inputs.version }}
      #environment: ${{ inputs.environment }}
      environment: production
    secrets: 
      ssh_key: ${{ secrets.ssh_key }}
      ssh_user: ${{ secrets.ssh_user }}
      rails_master_key: ${{ secrets.rails_master_key }}

  info:
    name: Show Parameter
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo event_name ${{ github.event_name }}
          echo ref_type ${{ github.ref_type }}
          echo ref ${{ github.ref }}
          echo "----- inputs ------"
          echo "tags: ${{ inputs.tags }}"
          echo "push: ${{ inputs.push }}"
          echo "target: ${{ inputs.target }}"
          echo "environment: ${{ inputs.environment }}"