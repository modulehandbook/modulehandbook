
# this is the general build and deploy pipeline definition.
# it is called with different paramters from the
# pl-start-* scripts.

name: "02: Pipeline Structure"
on:
  workflow_call:
    inputs:
      tags:
        required: true
        type: string
      target:
        required: false
        type: string
        default: modhand-prod

      push:
        required: false
        type: boolean
        default: false

      environment:
        required: false
        type: string
        default: staging
      version:
        required: false
        type: string
        default: latest
# these are mainly for testing
      run_tests:
        required: false
        type: boolean
        default: false
      build_docker:
        required: false
        type: boolean
        default: false

jobs:
  unit_tests:
    if: ${{ inputs.run_tests }}
    name: "1"
    uses: ./.github/workflows/pipeline_03_test_rails_app.yml
  system_test:
    if: ${{ inputs.run_tests }}
    name: "1"
    uses: ./.github/workflows/pipeline_03_system_test.yml
  code_quality:
    if: ${{ inputs.run_tests }}
    name: "1"
    uses: ./.github/workflows/pipeline_03_code_quality.yml

  all_tests:
    if: ${{ inputs.run_tests }}
    needs: [unit_tests, system_test, code_quality]
    name: All Tests OK
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo All Tests have passed!
          
  
  build_and_push:
    if: ${{ inputs.build_docker }}
    needs: all_tests
    name: "2"
    uses: ./.github/workflows/pipeline_04_docker_build_and_push.yml
    with:
      tags: ${{ inputs.tags }}
      push: ${{ inputs.push }}
      target: ${{ inputs.target }}
      environment: ${{ inputs.environment }}
      version: ${{ inputs.version }}
    secrets:
      rails_master_key: ${{ secrets.rails_master_key }}

  info:
    name: Show Parameter
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo event_name ${{ github.event_name }}
          echo ref_type ${{ github.ref_type }}
          echo ref ${{ github.ref }}
          echo "----- inputs ------"
          echo "tags: ${{ inputs.tags }}"
          echo "push: ${{ inputs.push }}"
          echo "target: ${{ inputs.target }}"
          echo "environment: ${{ inputs.environment }}"
      - name: print github environment
        if: false
        continue-on-error: true     
        run: |
          echo "---- github:\n${{ toJSON(github) }}"
