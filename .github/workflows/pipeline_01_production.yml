# names are short as they are pre-pended on gh actions
name: Production
on:
  push:
    tags: [ '*' ]

env:
  VERSION: ${{ github.sha }}
  TAG:  ${{ github.tag }}

jobs:
  defineversion:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.defineversion.outputs.version}}
    steps:
      - name: print github environment      
        run: |
          echo "---- github:\n${{ toJSON(github) }}"
      - id: defineversion
        run: echo "version=${TAG}" >> "$GITHUB_OUTPUT"

  production:
     needs: defineversion
     name: Prod
     # this will not work as the ref is ref/tags/0...
     # if: github.ref == 'refs/heads/master'
     uses: ./.github/workflows/pipeline_02_structure.yml
     with:
       tags: type=ref,event=tag
       push: true
       environment: production
       version: ${{ needs.defineversion.outputs.version }}
     secrets:
       rails_master_key: ${{ secrets.RAILS_MASTER_KEY }}
       DEPLOY_MH_KEY: ${{ secrets.DEPLOY_MH_KEY }}
       DEPLOY_MH_USER: ${{ secrets.DEPLOY_MH_USER }}
       DEPLOY_MHIMI_KEY: ${{ secrets.DEPLOY_MHIMI_KEY }}
       DEPLOY_MHIMI_USER: ${{ secrets.DEPLOY_MHIMI_USER }}

