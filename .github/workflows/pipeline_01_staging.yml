# names are short as they are prepended on gh actions
name: Staging
on:
  push:
    #branches: [ 'main' ]
    branches: [ main,  wf_matrix ]
    tags-ignore: [ '*' ]

env:
  SHA:  ${{ github.sha }}

jobs:
  defineversion:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.defineversion.outputs.version}}
    steps:
      - id: defineversion
        run: echo "version=sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"

  staging:
    needs: defineversion
    name: "Stag"
    # if: ${{ github.ref_type == 'branch' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/pipeline_02_structure.yml
    with:
      tags: type=sha
      push: true
      environment: staging
      version: ${{ needs.defineversion.outputs.version }}
      target: modhand-prod


  deploy_staging:
    needs: build-and-test
    name: "Deploy Staging"
    uses: ./.github/workflows/pipeline_05_deploy.yml
    with:
      environment: production
      version: ${{ needs.defineversion.outputs.version }}
    secrets: 
      ssh_key: ${{ secrets.DEPLOY_KEY_STAGING }}
      ssh_user: ${{ secrets.DEPLOY_USER_STAGING }}
      rails_master_key: ${{ secrets.RAILS_MASTER_KEY_STAGING }}
